<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday - Vintage Flip Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="shooting-stars-container"></div>

    <div class="book-wrapper">
        <div class="book" id="flipbook">
            
            <div class="paper" id="p3">
                <div class="front sepia-bg">
                    <div class="page-content">
                        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/4cOdK2wGLETKBW3PvgPWqT?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                        <p class="handwriting text-center" style="margin-top: 20px;">รักนะ 🤍</p>
                    </div>
                </div>
                <div class="back kraft-bg">
                    </div>
            </div>

            <div class="paper" id="p2">
                <div class="front sepia-bg">
                    <div class="page-content">
                        <p class="handwriting">
                            สุขสันต์วันเกิดนะ! <br><br>
                            (ใส่ข้อความอวยพรยาวๆ ของคุณตรงนี้ได้เลย ฟอนต์นี้จะให้ความรู้สึกเหมือนลายมือเขียนบนกระดาษเก่าๆ ดูกันเองและอบอุ่นที่สุด)
                        </p>
                    </div>
                </div>
                <div class="back sepia-bg">
                    <div class="page-content">
                        <div class="star-graphic" style="opacity: 0.3;">✨</div>
                    </div>
                </div>
            </div>

            <div class="paper" id="p1">
                <div class="front kraft-bg cover-shadow">
                    <div class="page-content cover-content">
                        <h1 class="handwriting title-text">สุขสันต์วันเกิด</h1>
                        <div class="star-graphic">⭐✨⭐</div>
                        <p class="click-hint">ลองเปิดดูสิ ↘</p>
                    </div>
                </div>
                <div class="back sepia-bg">
                    <div class="page-content text-center">
                        <p class="typewriter quote-text">
                            "ฉันอธิษฐานต่อดวงดาว<br>
                            ขอให้ความปรารถนา<br>
                            ของคุณเป็นจริง"
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
